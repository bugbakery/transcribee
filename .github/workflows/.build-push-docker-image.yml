name: Build (and push) docker image

on:
  workflow_call:
    inputs:
      dockerfile:
        type: string
        required: true
      push:
        type: boolean
        default: false
      image_name:
        type: string
        required: true
      registry:
        type: string
        default: ghcr.io
      cache_mode:
        type: string
        default: min
      raw_tag:
        type: string
      version_tag:
        type: string
      latest_tag:
        type: boolean
        default: false

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    name: "Build${{ inputs.push && ' and push' || ''  }} docker image"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ inputs.registry }}
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image_name }}
          tags: |
            type=semver,pattern={{version}},enable=${{ inputs.version_tag != '' }},value=${{ inputs.version_tag }}
            type=raw,value=${{ inputs.raw_tag }}
            type=raw,value=latest,enable=${{ inputs.latest_tag }}

      - name: "Build${{ inputs.push && ' and push' || ''  }}"
        uses: docker/build-push-action@v7
        with:
          context: .
          pull: true # always pull dependency images
          push: ${{ inputs.push }}
          file: ${{ inputs.dockerfile }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: ${{ inputs.cache_mode != 'off' && 'type=gha' || '' }}
          cache-to: ${{ inputs.cache_mode != 'off' && format('type=gha,mode={0}', inputs.cache_mode) || '' }}
