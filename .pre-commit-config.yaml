# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # python checks
  - repo: https://github.com/psf/black
    rev: 23.1.0
    hooks:
      - id: black
  - repo: local
    hooks:
      - id: ruff
        name: Run ruff for python files
        entry: ruff check --config .ruff.toml --force-exclude --fix
        language: system
        "types_or": [python, pyi]

  # package manager managed projects
  - repo: local
    hooks:
      - id: projects
        name: "projects"
        entry: packaging/pre-commit-projects.py
        language: system
        files: .*
        pass_filenames: true
        require_serial: true

  # openapi
  - repo: local
    hooks:
      - id: backend-openapi
        name: "backend: openapi-schema"
        entry: poe -C backend/ generate_openapi --file openapi-schema.yml
        language: system
        files: backend/.*
        pass_filenames: false
  - repo: local # openapi-schema typescript from the openapi-schema of the backend
    hooks:
      - id: frontend-openapi-typescript
        name: "frontend: openapi-typescript"
        entry: npm --prefix frontend/ run generate-openapi
        language: system
        files: backend/openapi-schema.yml
        pass_filenames: false
