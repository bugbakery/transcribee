name: transcribee

services:
  backend:
    build:
      dockerfile: ./packaging/docker/Dockerfile
    environment:
      TRANSCRIBEE_BACKEND_DATABASE_URL: postgresql://transcribee:transcribee@db:5432/transcribee
      REDIS_HOST: redis
      TESTUSER_PASSWORD: test
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - postgres-data:/var/lib/postgresql
  db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_PASSWORD: transcribee
      POSTGRES_USER: transcribee
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d transcribee -U transcribee"]
      interval: 1s
      timeout: 5s
      retries: 10
  redis:
    image: redis:8
    restart: always

volumes:
  postgres-data:
